name: rav4-poll
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay under load)
  workflow_dispatch: {}       # lets you trigger a run by hand

permissions:
  contents: write             # bot.py may commit + push service changes

jobs:
  poll:
    runs-on: ubuntu-latest
    # secrets.* can't be used in step-level `if`; surface as job env vars.
    # Use EITHER a metered API key OR a Claude subscription OAuth token
    # (`claude setup-token`). If both are set, ANTHROPIC_API_KEY wins, so set
    # only one. The bot steps run if either is present.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    defaults:
      run:
        working-directory: rav4-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # Watch for dealer replies; notify the lowest price once >=5 reply.
      - name: poll
        if: always()
        run: python poll.py
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Conversational control plane — runs if you've set ANTHROPIC_API_KEY
      # or a subscription CLAUDE_CODE_OAUTH_TOKEN.
      - name: install Claude Code
        if: ${{ always() && (env.ANTHROPIC_API_KEY != '' || env.CLAUDE_CODE_OAUTH_TOKEN != '') }}
        run: npm install -g @anthropic-ai/claude-code
      - name: git identity
        if: ${{ always() && (env.ANTHROPIC_API_KEY != '' || env.CLAUDE_CODE_OAUTH_TOKEN != '') }}
        run: |
          git config user.name "rav4-bot"
          git config user.email "rav4-bot@users.noreply.github.com"
      - name: bot
        if: ${{ always() && (env.ANTHROPIC_API_KEY != '' || env.CLAUDE_CODE_OAUTH_TOKEN != '') }}
        run: python bot.py
        env:
          CI: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
